name: tests

# Run the test suite (including the ~39 Postgres-backed test files that skip
# locally without DATABASE_URL) + ruff lint, on every push to main and on PRs.
# Mirrors the production Python (3.13, per the Dockerfile) so CI catches what
# would break the Railway deploy. The tests self-bootstrap the schema
# (db.init_pool + db.bootstrap_schema), so a fresh empty Postgres is enough.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gpi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gpi_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests scripts

      - name: Tests (with Postgres)
        run: pytest -q
