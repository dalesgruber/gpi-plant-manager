{% extends "_staffing_base.html" %}
{% block title %}What's New — GPI Plant Manager{% endblock %}
{% block content %}
<main class="changelog-page" style="max-width:840px;margin:0 auto;padding:1rem">
  <h1 style="margin-bottom:0.25rem">What's New</h1>
  <p class="muted" style="margin-top:0">
    Recent Plant Manager changes, newest first. The same entries appear in the
    What's New panel (top-right button on any page).
  </p>
  {{ entries_html|safe }}
</main>
<style>
  /* Card styles come from footer.css (shared with the What's New modal).
     Read-state buttons only work inside the modal — hide them here. */
  .changelog-page .cl-markread { display: none; }
  .changelog-page .cl-entry { margin-bottom: 1rem; }
</style>
{% endblock %}
