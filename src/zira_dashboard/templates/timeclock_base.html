<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>{% block title %}Timeclock{% endblock %}</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    height: 100%; width: 100%;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: #f8fafc; color: #0f172a;
    user-select: none; -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    overflow: hidden;
  }
  body { display: flex; flex-direction: column; }
  a { color: inherit; }

  .k-header {
    flex: 0 0 auto;
    padding: 1rem 1.5rem;
    background: #ffffff;
    border-bottom: 1px solid #e2e8f0;
    color: #0f172a;
    font-size: 1.5rem; font-weight: 600;
    display: flex; justify-content: space-between; align-items: center;
    gap: 1rem;
  }
  .k-header > span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .k-header-home { display:grid; grid-template-columns:minmax(0,1fr) auto minmax(0,1fr); }
  .k-header-actions { justify-self:end; display:flex; align-items:center; gap:1rem; }
  .saturday-home-banner { justify-self:center; display:flex; flex-direction:column; align-items:center; text-align:center; color:#92400e; }
  .saturday-home-banner strong { font-size:1.05rem; }
  .saturday-home-banner small { font-size:.72rem; font-weight:600; margin-top:.2rem; }
  .saturday-home-plan {
    border:0; background:transparent; cursor:pointer; font:inherit; padding:0;
  }
  .saturday-home-plan:focus-visible {
    outline:3px solid #2563eb; outline-offset:4px; border-radius:.5rem;
  }
  .saturday-choice-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:1rem; width:min(100%, 800px); }
  .saturday-choice-grid .k-btn { width:100%; min-width:0; }
  .saturday-partial-link { display:block; margin:1rem auto 0; width:max-content; font-size:.85rem; color:#64748b; }
  .saturday-status { margin-top:2rem; padding:1.25rem; border:1px solid #bfdbfe; border-radius:.75rem; background:#eff6ff; text-align:center; }
  .saturday-status h2 { color:#1e3a8a; }

  .k-back {
    background: #e2e8f0; color: #0f172a;
    border: none; border-radius: 0.5rem;
    padding: 0.75rem 1.5rem;
    font-size: 1.25rem; font-weight: 500;
    min-height: 64px; min-width: 100px;
    cursor: pointer;
    text-decoration: none; display: inline-flex; align-items: center; justify-content: center;
  }
  .k-back:active { background: #cbd5e1; }

  /* Square icon button (e.g. the Who's Out shortcut in the home header). */
  .k-icon-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 56px; height: 56px; flex-shrink: 0;
    border: 1px solid #e2e8f0; border-radius: 0.6rem;
    background: #ffffff; color: #475569;
    text-decoration: none; cursor: pointer;
  }
  .k-icon-btn:active { background: #f1f5f9; transform: scale(0.97); }

  .k-brand { display: flex; align-items: center; gap: 0.6rem; flex-shrink: 0; }
  .k-brand img { height: 38px; width: auto; display: block; }
  .k-brand-text { line-height: 1; }
  .k-brand-name {
    font-weight: 700; letter-spacing: 0.04em; font-size: 1rem;
    color: #0f172a;
  }
  .k-brand-sub {
    font-size: 0.65rem; letter-spacing: 0.2em;
    color: #64748b; margin-top: 3px;
  }

  .k-main {
    flex: 1 1 auto;
    min-height: 0;            /* lets flex child shrink past content size so overflow:auto actually engages */
    padding: 2rem;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;   /* legacy iOS momentum scroll */
    touch-action: pan-y;                 /* explicit: allow vertical swipe to scroll */
    overscroll-behavior: contain;        /* don't bubble scroll to the locked body */
    display: flex; flex-direction: column;
  }

  .k-btn {
    background: #2563eb; color: white;
    border: none; border-radius: 0.75rem;
    padding: 1.5rem 2rem;
    font-size: 2rem; font-weight: 600;
    min-height: 96px; min-width: 200px;
    cursor: pointer;
    transition: transform 0.05s, background 0.1s;
    font-family: inherit;
    line-height: 1.1;
    box-shadow: 0 1px 3px rgba(15, 23, 42, 0.08);
  }
  .k-btn:active { transform: scale(0.97); background: #1d4ed8; }
  .k-btn.secondary {
    background: #ffffff; color: #0f172a;
    border: 1px solid #e2e8f0;
  }
  .k-btn.secondary:active { background: #f1f5f9; }
  .k-btn.danger { background: #dc2626; color: white; }
  .k-btn.danger:active { background: #b91c1c; }
  .k-btn.success { background: #16a34a; color: white; }
  .k-btn.success:active { background: #15803d; }

  h1 { font-size: 2.5rem; margin: 0 0 1.5rem 0; font-weight: 700; line-height: 1.1; color: #0f172a; }
  h2 { font-size: 1.75rem; margin: 0 0 1rem 0; font-weight: 500; color: #475569; }

  .k-error {
    background: #fee2e2; color: #991b1b;
    padding: 1rem 1.5rem; border-radius: 0.5rem;
    font-size: 1.25rem; margin-bottom: 1.5rem;
    border: 1px solid #fecaca;
  }
  .k-warning {
    background: #fef3c7; color: #92400e;
    padding: 1rem 1.5rem; border-radius: 0.5rem;
    font-size: 1.25rem; margin-bottom: 1.5rem;
    border: 1px solid #fde68a;
  }
  .lunch-note {
    background: #eff6ff; color: #1e40af;
    padding: 1rem 1.5rem; border-radius: 0.5rem;
    font-size: 1.25rem; margin-bottom: 1.5rem;
    border: 1px solid #bfdbfe;
  }
  .k-modal-overlay {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(15, 23, 42, 0.55);
    display: flex; align-items: center; justify-content: center;
    padding: 1.5rem;
  }
  .k-modal-card {
    background: #ffffff; border-radius: 0.75rem;
    padding: 2rem; max-width: 560px; width: 100%;
    box-shadow: 0 10px 40px rgba(15, 23, 42, 0.3);
    text-align: center;
  }
  .k-modal-card p {
    font-size: 1.4rem; color: #0f172a; line-height: 1.4;
    margin: 0 0 1.75rem 0;
  }
  .k-modal-actions {
    display: flex; flex-direction: column; gap: 0.75rem;
  }
  .saturday-schedule-card {
    max-width:760px; max-height:min(70vh, 620px); overflow-y:auto;
  }
  .saturday-schedule-assignment {
    border-top:1px solid #e2e8f0; padding:1rem 0; text-align:left;
  }
  .saturday-schedule-assignment h3 {
    margin:0 0 .35rem; color:#1e3a8a; font-size:1.3rem;
  }
  .saturday-schedule-assignment p {
    margin:0; font-size:1.1rem;
  }

  /* htmx fragment swap: subtle fade so screen-to-screen transitions
     don't strobe. ~120ms is fast enough that the kiosk still feels
     snappy but smooths the perceived swap.
     Also: #timeclock-screen is the actual viewport-filling flex container,
     not body — body's only direct child is this wrapper. Without
     `flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column`
     here, the .k-main child's overflow-y:auto never engages because its
     parent (#timeclock-screen) has no height constraint. */
  #timeclock-screen {
    flex: 1 1 auto;
    min-height: 0;
    display: flex;
    flex-direction: column;
    opacity: 1;
    transition: opacity 120ms ease;
  }
  #timeclock-screen.htmx-swapping { opacity: 0; }

  /* Spanish-primary text: one inline-flex column keeps the two language lines
     together in headings, buttons, and flex-row links alike. */
  .k-bi {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    vertical-align: middle;
    line-height: 1.15;
  }
  .k-primary {
    font-size: 1em;
    font-weight: inherit;
    color: inherit;
  }
  .k-secondary {
    font-size: 0.6em;
    font-weight: 400;
    font-style: italic;
    color: #64748b;
    line-height: 1.2;
    margin-top: 0.2em;
    opacity: 0.9;
  }
  /* Filled buttons (blue/red/green) have white English text — the muted
     gray Spanish is low-contrast on them. Use light text so it stays
     legible. Secondary (white) buttons keep the gray, which reads fine. */
  .k-btn:not(.secondary) .k-secondary { color: rgba(255, 255, 255, 0.9); opacity: 1; }
</style>
<script src="/static/htmx-1.9.12.min.js?v={{ static_v('htmx-1.9.12.min.js') }}"
        integrity="sha384-ujb1lZYygJmzgSwoxRggbCHcjc0rB2XoQrxeTUQyRjrOnlCoYta87iKBWq3EsdM2"
        crossorigin="anonymous"
        defer></script>
</head>
<body hx-boost="true"
      hx-target="#timeclock-screen"
      hx-select="#timeclock-screen"
      hx-swap="outerHTML swap:120ms">
<div id="timeclock-screen">
{% block content %}{% endblock %}
{% block scripts %}{% endblock %}
</div>
<script>
  // hx-boost is on the <body>, so every kiosk form (including the time-off
  // request/edit form) submits via htmx. By default htmx does NOT swap
  // responses with a 4xx/5xx status — it fires htmx:responseError and leaves
  // the DOM untouched. Two time-off submit outcomes intentionally re-render
  // the *same* screen with a non-2xx status: 409 (the request overlaps time
  // off you already have -> conflict modal) and 422 (partial-day times fall
  // outside your shift -> error banner). Without this handler those responses
  // are silently dropped and the green Submit button looks like it does
  // nothing. Opt just those two statuses back into a normal swap so the
  // returned screen replaces the form exactly like a 200 would.
  document.body.addEventListener('htmx:beforeSwap', function (evt) {
    var status = evt.detail.xhr.status;
    if (status === 409 || status === 422) {
      evt.detail.shouldSwap = true;
      evt.detail.isError = false;
    }
  });

  // Idle timeout: return to the home screen after a period of no input.
  // The delay is recomputed from the URL on every reset (never cached) so it
  // can't leak across htmx screen swaps:
  //   - home itself        -> no auto-return (already there; would self-reload)
  //   - Who's Out glance    -> 10s (unattended public glance from the home icon)
  //   - every other screen  -> 30s
  // Sits OUTSIDE #timeclock-screen so htmx swaps don't tear down/rebind it.
  (function() {
    var timer;
    function idleMs() {
      var p = location.pathname;
      if (p === '/timeclock' || p === '/timeclock/') return 0;
      if (p === '/timeclock/whos-out') return 10000;
      return 30000;
    }
    function reset() {
      clearTimeout(timer);
      var ms = idleMs();
      if (!ms) return;
      timer = setTimeout(function() { location.href = '/timeclock'; }, ms);
    }
    ['touchstart','mousedown','keydown','pointerdown'].forEach(function(evt) {
      document.addEventListener(evt, reset, { passive: true });
    });
    reset();
    // Re-arm the timer on every htmx-driven screen change too.
    document.body.addEventListener('htmx:afterSwap', reset);
  })();
</script>
</body>
</html>
