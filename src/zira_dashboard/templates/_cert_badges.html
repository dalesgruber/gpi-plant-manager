{# Reusable certification badges.

Usage:
  {% from "_cert_badges.html" import cert_badges, cert_badges_css %}
  ...
  <head><style>... {{ cert_badges_css() }} ...</style></head>
  ...
  <span class="name">{{ name }}</span>{{ cert_badges(name, person_certs) }}

`cert_badges_css()` emits raw CSS rules (NOT wrapped in a <style> tag);
call it inside an existing <style> block in the template.

`cert_icon_svg` is registered as a Jinja global in app.py — it returns
the inline SVG string for a known cert, or None for an unmapped cert
(macro then falls back to a text pill).
#}

{% macro cert_badges_css() -%}
.cert-badges {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  margin-left: 6px;
  vertical-align: middle;
}
.cert-badge {
  display: inline-flex;
  align-items: center;
  color: var(--accent, currentColor);
}
.cert-badge svg {
  width: 14px;
  height: 14px;
  display: block;
  opacity: 0.95;
}
/* Per-cert color overrides — SVG strokes inherit `color` via currentColor. */
.cert-badge-forklift   { color: #facc15; } /* yellow */
.cert-badge-spotter    { color: #22c55e; } /* green  */
.cert-badge-cdl-manual { color: #3b82f6; } /* blue   */
.cert-badge-cdl-auto   { color: #a855f7; } /* purple */
.cert-pill {
  display: inline-block;
  font-size: 0.65rem;
  font-weight: 600;
  padding: 1px 5px;
  border-radius: 999px;
  border: 1px solid var(--border, #ccc);
  color: var(--muted, #666);
  text-transform: uppercase;
  letter-spacing: 0.02em;
  line-height: 1.3;
}
{%- endmacro %}

{% macro cert_badges(name, person_certs) -%}
{%- set certs = (person_certs or {}).get(name, []) -%}
{%- if certs -%}
<span class="cert-badges">
{%- for cert in certs -%}
  {%- set svg = cert_icon_svg(cert) -%}
  {%- set slug = cert_icon_slug(cert) -%}
  {%- if svg -%}
    <span class="cert-badge{% if slug %} cert-badge-{{ slug }}{% endif %}" title="{{ cert }}">{{ svg|safe }}</span>
  {%- else -%}
    <span class="cert-pill" title="{{ cert }}">{{ cert.split()[0]|upper }}</span>
  {%- endif -%}
{%- endfor -%}
</span>
{%- endif -%}
{%- endmacro %}
